---
- name: Playbook para obtener bases no productivas que apuntan a produccion
  hosts: ora_desa
  
  tasks:
    - name: Copia archivos
      copy:
        src: '{{item}}'
        dest: /home/oracle/
        owner: oracle
        group: oinstall
        mode: 0755
      loop:
        - "{{ playbook_dir }}/dblinks.sh"
        - "{{ playbook_dir }}/ora_inst_prod.txt"
       
    - name: Ejecutar shell script  
      shell: /home/oracle/dblinks.sh
      notify:
          - Eliminar archivos
  
  handlers: 
    - name: Eliminar archivos
      file:
        path: '{{item}}'
        state: absent
      loop: 
          - /home/oracle/dblinks.sh
          - /home/oracle/ora_inst_prod.txt
  
- name: Unir varios archivos en uno
  hosts: sopbd
  vars: 
     main_dir: /ora_scripts/logs/dblinks
     
  tasks: 
      - name: Elimina archivo texto existente
        file:
          path: '{{ main_dir }}/dblinks.txt'
          state: absent

      - name: Ejecutar comando assemble texto
        assemble:
          src: '{{ main_dir }}'
          dest: '{{ main_dir }}/dblinks.txt'
          regexp: 'dblinks_.*\.txt'

      - name: Ordenar reporte texto consolidado
        shell: sort -o dblinks.txt dblinks.txt
        args:
          chdir: '{{ main_dir }}'

      - name: Elimina archivo HTML existente
        file:
          path: '{{ main_dir }}/dblinks.html'
          state: absent

      - name: Copiar plantillas HTML
        copy:
          src: '{{ item }}'
          dest: '{{ main_dir }}/'
        loop:
          - "{{ playbook_dir }}/dblinks_html_head.inc"
          - "{{ playbook_dir }}/dblinks_html_foot.inc"

      - name: Copiar script generacion HTML
        copy:
          src: "{{ playbook_dir }}/dblinks_build_html.sh"
          dest: "{{ main_dir }}/dblinks_build_html.sh"
          mode: "0755"

      - name: Generar reporte HTML desde archivos texto
        shell: ./dblinks_build_html.sh
        args:
          chdir: '{{ main_dir }}'

      - name: Limpiar archivos auxiliares HTML
        shell: rm -f dblinks_html_head.inc dblinks_html_foot.inc dblinks_build_html.sh
        args:
          chdir: '{{ main_dir }}'

      - name: Verificar reporte HTML consolidado
        stat:
          path: "{{ main_dir }}/dblinks.html"
        register: dblinks_html

      - name: Copiar script envio correo
        copy:
          src: "{{ playbook_dir }}/dblinks_send_mail.sh"
          dest: "{{ main_dir }}/dblinks_send_mail.sh"
          mode: "0755"

      - name: Enviar reporte HTML adjunto por correo
        shell: ./dblinks_send_mail.sh
        args:
          chdir: '{{ main_dir }}'
        when:
          - dblinks_html.stat.exists
          - dblinks_html.stat.size > 0
          - ansible_date_time.hour == '11'

      - name: Limpiar script envio correo
        file:
          path: '{{ main_dir }}/dblinks_send_mail.sh'
          state: absent

      - name: Eliminar archivos texto fuente por host
        shell: find . -name 'dblinks_*.txt' -exec rm -f {} \;
        args:
          chdir: '{{ main_dir }}'
